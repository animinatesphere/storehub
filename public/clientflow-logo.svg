<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="115" fill="#059669"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="115" fill="url(#glow)" opacity="0.4"/>

  <!-- Letter C — arc opening right, center ~(167,256) r=90 -->
  <path
    d="M230 192A90 90 0 1 0 230 320"
    stroke="white"
    stroke-width="36"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Arrow shaft -->
  <line x1="282" y1="256" x2="410" y2="256" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Arrow head -->
  <path
    d="M346 196 L410 256 L346 316"
    stroke="white"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <defs>
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
