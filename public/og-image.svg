  <path d="M131 239A36 36 0 1 0 131 291" stroke="white" stroke-width="13" stroke-linecap="round" fill="none"/>
  <line x1="153" y1="265" x2="193" y2="265" stroke="white" stroke-width="13" stroke-linecap="round"/>
  <path d="M172 244L193 265L172 286" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

